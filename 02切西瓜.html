<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>西瓜对决 - 双人卡牌游戏</title>
    <style>
        * {
            user-select: none;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', '华文楷书', 'Microsoft YaHei', cursive, sans-serif;
            margin: 0;
            padding: 0;
            position: relative;
        }

        /* 游戏主容器 - 普通模式 */
        .game-container {
            width: 1300px;
            max-width: 98vw;
            background: rgba(0, 0, 0, 0.35);
            border-radius: 60px 60px 40px 40px;
            backdrop-filter: blur(2px);
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            padding: 20px 15px 15px 15px;
            border: 2px solid #ffd966;
            position: relative;
        }

        /* ========== 开始界面 - 独立全屏，不依赖任何父容器 ========== */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            overflow: hidden;
        }
        .start-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }
        /* 横屏默认图片 */
        .start-image {
            background-image: url('images/游戏初始画面横版.jpg');
        }
        /* 竖屏适配 - 使用竖版图片 */
        @media (orientation: portrait) {
            .start-image {
                background-image: url('images/游戏初始画面.jpg');
            }
        }
        .start-btn-main {
            position: absolute;
            bottom: 10%;
            z-index: 10;
            background: #ffaa33;
            font-size: 2rem;
            padding: 16px 50px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #b45f1b;
            transition: 0.1s;
            color: #2b1a0e;
            font-family: inherit;
            margin-bottom: 5vh;
        }
        .start-btn-main:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #b45f1b;
        }
        /* 开始界面底部的版权信息 */.start-copyright {
    position: absolute;   /* ✅ 改这里 */
    bottom: 2%;           /* ✅ 固定在最底部 */
    left: 50%;
    transform: translateX(-50%);  /* ✅ 居中 */
    z-index: 10;

    font-size: 0.9rem;
    color: #ffde9c;
    opacity: 0.9;
    letter-spacing: 1px;
    font-family: monospace;
    background: rgba(0,0,0,0.5);
    padding: 6px 20px;
    border-radius: 30px;
    backdrop-filter: blur(4px);
}
        /* 隐藏开始界面 */
        .hidden-screen {
            display: none !important;
        }

        /* ========== 原有游戏样式保持不变 ========== */
        .player-area {
            background: rgba(30, 20, 10, 0.5);
            border-radius: 40px;
            margin: 10px 0;
            padding: 15px;
            transition: all 0.2s;
            border: 2px solid #ffb347;
        }
        .player-top { background: rgba(25, 55, 35, 0.7); }
        .player-bottom { background: rgba(45, 30, 20, 0.7); }
        .active-turn {
            box-shadow: 0 0 0 4px #ffd700, 0 0 0 8px #ffaa33;
            background: rgba(80, 55, 25, 0.8);
        }
        .player-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffecb3;
            text-shadow: 2px 2px 0 #b45f1b;
            display: inline-block;
            background: #5d3a1a;
            padding: 5px 20px;
            border-radius: 40px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        .watermelon-area {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .watermelon-card {
            background: #2b7a3b;
            width: 210px;
            border-radius: 30px;
            padding: 12px 8px;
            box-shadow: 0 10px 0 #1b4d1b;
            text-align: center;
            border: 2px solid #f9b81b;
        }
        .watermelon-img {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .watermelon-title {
            font-weight: bold;
            margin: 8px 0;
            color: #ffefb9;
            background: #5a3e1f;
            border-radius: 20px;
            display: inline-block;
            padding: 2px 15px;
            font-size: 1.1rem;
        }
        .props-slots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
            min-height: 65px;
        }
        .prop-slot {
            width: 65px;
            height: 65px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #fffaec;
            border-radius: 18px;
            border: 2px dashed #b8860b;
        }
        .prop-slot.empty-slot { background-image: none; background-color: #fffaec; }
        .prop-slot.lid-slot { background-image: url('images/道具槽-锅盖.png'); }
        .prop-slot.rod-slot { background-image: url('images/道具槽-聚雷针.png'); }
        .hand-card {
            width: 100px;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #fef0cf;
            border-radius: 16px;
            padding: 12px 4px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.3);
            border-left: 6px solid #ffb347;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }
        .hand-card .card-type { display: none; }
        .hand-card.selected {
            transform: scale(1.02);
            border-left-color: red;
            box-shadow: 0 0 0 2px gold;
        }
        .card-lid { background-image: url('images/手牌-道具-锅盖.png'); }
        .card-rod { background-image: url('images/手牌-道具-聚雷针.png'); }
        .card-knife { background-image: url('images/手牌-技能-小刀.png'); }
        .card-lightning { background-image: url('images/手牌-技能-闪电.png'); }
        .card-cloth { background-image: url('images/手牌-技能-时光包袱布.png'); }
        .deck-card {
            width: 100px;
            height: 130px;
            background-image: url('images/封面2.png');
            background-size: cover;
            border-radius: 12px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 0 black;
        }
        .discard-card-mini {
            background-size: cover;
            width: 50px;
            height: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #e0b074;
            border-radius: 8px;
            font-size: 0.7rem;
        }
        .center-panel {
            display: flex;
            justify-content: space-between;
            margin: 15px 20px;
            gap: 20px;
        }
        .deck-area, .discard-area {
            background: #4a2c18;
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            color: #fbe6a0;
            width: 180px;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.5), 0 5px 0 #2b1a0e;
        }
        .discard-cards {
            min-height: 100px;
            background: #3a281a;
            border-radius: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 5px;
            justify-content: center;
        }
        .hand-area {
            margin-top: 20px;
            background: #392e1fcc;
            border-radius: 40px;
            padding: 12px;
            backdrop-filter: blur(8px);
        }
        .hand-cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0 5px;
            flex-wrap: wrap;
        }
        button {
            background: #f5bc70;
            border: none;
            font-size: 1.2rem;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #9b5e2c;
            transition: 0.1s;
            font-family: inherit;
        }
        button:active { transform: translateY(2px); }
        .draw-turn-btn {
            background: #4caf50;
            color: white;
            box-shadow: 0 4px 0 #2e6b2f;
            font-size: 1.4rem;
            padding: 10px 30px;
        }
        .start-btn {
            background: #ffaa33;
            font-size: 1.5rem;
            padding: 12px 35px;
        }
        .role-selector {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .role-item {
            background: #2f2a1f;
            padding: 5px 15px;
            border-radius: 40px;
            color: #ffd58c;
            font-size: 1.1rem;
        }
        select {
            background: #ffecb3;
            border-radius: 20px;
            padding: 6px;
            font-size: 1rem;
        }
        .hidden { display: none; }
        .info-text {
            color: #ffde9c;
            text-align: center;
            margin-top: 8px;
            font-size: 1rem;
            text-shadow: 1px 1px 0 #4a2c18;
        }
        .victory-overlay {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:#000000cc;
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:200;
            flex-direction:column;
            backdrop-filter:blur(5px);
        }
        .victory-card {
            background: #ffe3a4;
            padding: 30px 50px;
            border-radius: 70px;
            text-align: center;
            font-size: 2rem;
            border: 8px solid gold;
        }
        .custom-dialog {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }
        .dialog-box {
            background: #fff2df;
            border-radius: 60px;
            padding: 30px 20px;
            text-align: center;
            min-width: 260px;
            border: 3px solid #ffb347;
            box-shadow: 0 10px 25px black;
        }
        .dialog-box p {
            font-size: 1.6rem;
            font-weight: bold;
            color: #5d3a1a;
            margin-bottom: 25px;
        }
        .dialog-buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .dialog-btn {
            font-size: 1.4rem;
            padding: 10px 30px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .dialog-btn.confirm { background: #4caf50; color: white; box-shadow: 0 3px 0 #2e6b2f; }
        .dialog-btn.cancel { background: #f5bc70; color: #4a2c18; box-shadow: 0 3px 0 #9b5e2c; }
        .watermelon-choice {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }
        .watermelon-choice button {
            font-size: 1.3rem;
            padding: 12px 25px;
            background: #ffb347;
            color: #2b1a0e;
        }
        .copyright {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #ffde9c;
            opacity: 0.7;
            letter-spacing: 1px;
            font-family: monospace;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
<!-- 开始界面 - 独立于 game-container 之外，确保全屏不受影响 -->
<div id="startScreen" class="start-screen">
    <div class="start-image" id="startImage"></div>
    <button id="startGameBtn" class="start-btn-main">开始游戏</button>
    <div class="start-copyright">©Twolobster丨Game</div>
</div>

<div class="game-container" id="gameApp">
    <!-- 角色选择界面 (初始隐藏) -->
    <div id="roleSelectPanel" class="role-selector hidden">
        <div class="role-item">👤 玩家一: <select id="roleA"><option>西瓜剑客</option><option>冰镇法师</option><option>瓜田守卫</option><option>Daniel</option><option>Linda</option><option>Maggie</option><option>Nini</option><option>Oscar</option><option>Ted</option><option>Ottis</option><option>喜乐</option></select></div>
        <div class="role-item">👤 玩家二: <select id="roleB"><option>甜瓜侠</option><option>翠衣仙子</option><option>藤蔓斗士</option><option>Daniel</option><option>Linda</option><option>Maggie</option><option>Nini</option><option>Oscar</option><option>Ted</option><option>Ottis</option><option>喜乐</option></select></div>
        <button id="confirmStartBtn" class="start-btn">🍉 开始游戏 🍉</button>
    </div>

    <!-- 游戏主界面 -->
    <div id="gameMain" class="hidden">
        <div class="player-area player-top" id="opponentArea">
            <div class="player-name" id="opponentName">对手</div>
            <div class="watermelon-area" id="opponentWatermelons"></div>
        </div>
        <div class="center-panel">
            <div class="deck-area"><div class="deck-card"></div><div>抓牌区 <span id="deckCount">0</span>张</div></div>
            <div class="discard-area"><div>🗑️ 弃牌堆</div><div class="discard-cards" id="discardPile"></div></div>
        </div>
        <div class="player-area player-bottom" id="currentPlayerArea">
            <div class="player-name" id="currentPlayerName">当前玩家</div>
            <div class="watermelon-area" id="currentWatermelons"></div>
        </div>
        <div id="handContainer" class="hand-area hidden">
            <div style="font-weight:bold; color:#ffde9c; font-size:1.2rem;">🍉 手牌区 (点击卡牌选择)</div>
            <div class="hand-cards" id="handCards"></div>
            <div class="btn-group">
                <button id="useCardBtn">✨ 使用选中牌</button>
                <button id="discardSelectedBtn">🚮 弃置选中牌</button>
                <button id="finishTurnBtn">✅ 出牌完成 / 结束回合</button>
            </div>
            <div id="turnMsg" class="info-text"></div>
        </div>
        <div id="drawPhaseContainer" class="btn-group hidden">
            <button id="startTurnDrawBtn" class="draw-turn-btn">🎴 开始回合 & 摸牌 🎴</button>
        </div>
        <div id="globalMsg" class="info-text"></div>
    </div>
    <div class="copyright">©Twolobster丨Watermelon Game</div>
</div>

<script>
    // ---------- 卡牌数据 ----------
    const CARDS = {
        lid: { name:"锅盖", type:"prop", sub:"lid", imgClass:"card-lid" },
        lightningRod: { name:"引雷针", type:"prop", sub:"rod", imgClass:"card-rod" },
        knife: { name:"小刀", type:"skill", sub:"knife", imgClass:"card-knife" },
        lightning: { name:"闪电", type:"skill", sub:"lightning", imgClass:"card-lightning" },
        cloth: { name:"时光包袱布", type:"skill", sub:"cloth", imgClass:"card-cloth" }
    };

    function buildDeck() {
        let deck = [];
        for(let i=0;i<4;i++) deck.push({...CARDS.lid});
        for(let i=0;i<4;i++) deck.push({...CARDS.lightningRod});
        for(let i=0;i<6;i++) deck.push({...CARDS.knife});
        for(let i=0;i<4;i++) deck.push({...CARDS.lightning});
        for(let i=0;i<4;i++) deck.push({...CARDS.cloth});
        return shuffle(deck);
    }
    function shuffle(arr) { for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];} return arr;}

    class Player {
        constructor(id, name) {
            this.id = id; this.name = name;
            this.watermelons = [
                { state:"full", props:[], history:null },
                { state:"full", props:[], history:null }
            ];
            this.hand = [];
            this.hasDrawnFirst = false;
        }
        saveHistory(idx) {
            let w = this.watermelons[idx];
            w.history = { state: w.state, props: w.props.map(p => ({...p})) };
        }
        restoreFromHistory(idx, game) {
            let w = this.watermelons[idx];
            if(!w.history) return false;
            let old = w.history;
            for(let p of w.props) game.discardPile.push({...p});
            w.props = [];
            for(let pData of old.props) {
                let restoredCard = {...pData};
                w.props.push(restoredCard);
                let idxDel = game.discardPile.findIndex(c=>c.sub === restoredCard.sub);
                if(idxDel!==-1) game.discardPile.splice(idxDel,1);
            }
            w.state = old.state;
            w.history = null;
            return true;
        }
    }

    let game = {
        playerA: null, playerB: null, currentPlayer: "A", deck: [], discardPile: [],
        gameOver: false, winner: null, phase: "waitingDraw"
    };

    let rolePanel, mainPanel, roleASelect, roleBSelect, confirmBtn;
    let opponentNameDiv, currentPlayerNameDiv, opponentWatermelonsDiv, currentWatermelonsDiv;
    let handContainer, handCardsDiv, useBtn, discardBtn, finishBtn, turnMsgDiv, globalMsg;
    let deckCountSpan, discardPileDiv, drawPhaseContainer, startTurnDrawBtn;
    let startScreen, startGameBtn, roleSelectPanel;

    function getPlayerById(id) { return id === "A" ? game.playerA : game.playerB; }
    function getCurrentPlayerObj() { return getPlayerById(game.currentPlayer); }
    function getOpponentPlayerObj() { return getPlayerById(game.currentPlayer === "A" ? "B" : "A"); }

    function getLocalImage(type, subType) {
        const basePath = 'images/';
        const map = {
            full: '西瓜整块.png',
            sliced: '西瓜切块.png',
            lid_slot: '道具槽-锅盖.png',
            rod_slot: '道具槽-聚雷针.png',
            empty_slot: '',
            card_lid: '手牌-道具-锅盖.png',
            card_rod: '手牌-道具-聚雷针.png',
            card_knife: '手牌-技能-小刀.png',
            card_lightning: '手牌-技能-闪电.png',
            card_cloth: '手牌-技能-时光包袱布.png'
        };
        let filename = '';
        if (type === 'watermelon') filename = map[subType];
        else if (type === 'propSlot') filename = map[`${subType}_slot`] || '';
        else if (type === 'handCard') filename = map[`card_${subType}`] || '';
        if (!filename) return '';
        return basePath + filename;
    }

    function renderWatermelon(player, container) {
        let html = '';
        for(let idx=0; idx<player.watermelons.length; idx++) {
            let wm = player.watermelons[idx];
            let watermelonImgUrl = getLocalImage('watermelon', wm.state === 'sliced' ? 'sliced' : 'full');
            html += `<div class="watermelon-card">
                <div class="watermelon-img" style="background-image: url('${watermelonImgUrl}');"></div>
                <div class="watermelon-title">西瓜${idx+1}</div>
                <div class="props-slots">`;
            for(let i=0;i<2;i++) {
                let prop = wm.props[i];
                let slotImgUrl = '';
                let slotClass = 'empty-slot';
                if(prop) {
                    if(prop.sub === 'lid') { slotClass = 'lid-slot'; slotImgUrl = getLocalImage('propSlot', 'lid'); }
                    else if(prop.sub === 'rod') { slotClass = 'rod-slot'; slotImgUrl = getLocalImage('propSlot', 'rod'); }
                }
                html += `<div class="prop-slot ${slotClass}" style="background-image: url('${slotImgUrl}');"></div>`;
            }
            html += `</div></div>`;
        }
        container.innerHTML = html;
    }

    function renderHand() {
        let cur = getCurrentPlayerObj();
        if(!cur || game.phase !== "playing") { handCardsDiv.innerHTML = ''; return; }
        handCardsDiv.innerHTML = cur.hand.map((card, idx) => {
            let imgUrl = getCardImageUrl(card);
            let imgClass = card.imgClass || '';
            return `<div class="hand-card ${imgClass}" data-handidx="${idx}" style="background-image: url('${imgUrl}'); background-size: cover;">
                        <div class="card-type" style="display:none;">${card.name}</div>
                    </div>`;
        }).join('');
        document.querySelectorAll('.hand-card').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('selected'));
                el.classList.add('selected');
            });
        });
    }

    function getCardImageUrl(card) {
        let sub = card.sub;
        if (sub === 'lid') return getLocalImage('handCard', 'lid');
        if (sub === 'rod') return getLocalImage('handCard', 'rod');
        if (sub === 'knife') return getLocalImage('handCard', 'knife');
        if (sub === 'lightning') return getLocalImage('handCard', 'lightning');
        if (sub === 'cloth') return getLocalImage('handCard', 'cloth');
        return '';
    }

    function renderDeckAndDiscard() {
        deckCountSpan.innerText = game.deck.length;
        discardPileDiv.innerHTML = game.discardPile.slice(-8).map(c => `<div class="discard-card-mini" style="background-image: url('${getCardImageUrl(c)}'); background-size: cover;">${c.name}</div>`).join('');
        if(game.discardPile.length===0) discardPileDiv.innerHTML = "<span>空</span>";
    }

    function updateUI() {
        if(game.gameOver) return;
        let cur = getCurrentPlayerObj();
        let opp = getOpponentPlayerObj();
        currentPlayerNameDiv.innerText = `${cur.name} (当前回合)`;
        opponentNameDiv.innerText = `${opp.name} (对手)`;
        renderWatermelon(cur, currentWatermelonsDiv);
        renderWatermelon(opp, opponentWatermelonsDiv);
        renderDeckAndDiscard();
        if(game.phase === "playing") {
            handContainer.classList.remove("hidden");
            drawPhaseContainer.classList.add("hidden");
            renderHand();
        } else {
            handContainer.classList.add("hidden");
            drawPhaseContainer.classList.remove("hidden");
        }
        document.querySelectorAll('.player-area').forEach(el=>el.classList.remove('active-turn'));
        document.getElementById("currentPlayerArea").classList.add("active-turn");
    }

    function drawCards(player, num) {
        for(let i=0;i<num;i++) {
            if(game.deck.length===0 && game.discardPile.length>0) {
                game.deck = shuffle([...game.discardPile]);
                game.discardPile = [];
                globalMsg.innerText = "抓牌堆已重新洗牌！";
            }
            if(game.deck.length===0) break;
            let card = game.deck.pop();
            player.hand.push(card);
        }
        updateUI();
    }

    function startTurnDraw() {
        if(game.gameOver || game.phase !== "waitingDraw") return;
        let cur = getCurrentPlayerObj();
        let drawAmount = cur.hasDrawnFirst ? 1 : 2;
        drawCards(cur, drawAmount);
        cur.hasDrawnFirst = true;
        game.phase = "playing";
        globalMsg.innerText = `${cur.name} 摸${drawAmount}张牌完毕，请出牌！`;
        updateUI();
    }

    function getSelectedHandCard() {
        let selectedDiv = document.querySelector('.hand-card.selected');
        if(!selectedDiv) return null;
        let idx = selectedDiv.getAttribute('data-handidx');
        let cur = getCurrentPlayerObj();
        return { card: cur.hand[parseInt(idx)], idx: parseInt(idx) };
    }

    function showWatermelonChoice(playerName) {
        return new Promise((resolve) => {
            const dialogDiv = document.createElement('div');
            dialogDiv.className = 'custom-dialog';
            dialogDiv.innerHTML = `
                <div class="dialog-box">
                    <p>🍉 对 ${playerName} 的哪个西瓜使用？</p>
                    <div class="watermelon-choice">
                        <button class="watermelon-btn" data-idx="0">西瓜1</button>
                        <button class="watermelon-btn" data-idx="1">西瓜2</button>
                    </div>
                </div>
            `;
            document.body.appendChild(dialogDiv);
            const btns = dialogDiv.querySelectorAll('.watermelon-btn');
            const cleanup = (idx) => {
                document.body.removeChild(dialogDiv);
                resolve(idx);
            };
            btns.forEach(btn => {
                btn.onclick = () => cleanup(parseInt(btn.dataset.idx));
            });
        });
    }

    async function selectTargetForPlayer(targetPlayer, maxPropSlotCheck=false, needLidCondition=false) {
        let targetIdx = await showWatermelonChoice(targetPlayer.name);
        if (targetIdx === undefined) return null;
        let watermelon = targetPlayer.watermelons[targetIdx];
        if(!watermelon) return null;
        if(maxPropSlotCheck && watermelon.props.length>=2) { alert("道具位已满"); return null; }
        if(needLidCondition && !watermelon.props.some(p=>p.sub==='lid')) { alert("需要该西瓜已有锅盖才能使用引雷针"); return null; }
        return { targetPlayer, targetIdx, watermelon };
    }

    async function useCard() {
        if(game.gameOver || game.phase !== "playing") { globalMsg.innerText="只有出牌阶段可用"; return; }
        let selected = getSelectedHandCard();
        if(!selected) { globalMsg.innerText="请先选中手牌"; return; }
        let cur = getCurrentPlayerObj();
        let card = selected.card;
        let handIdx = selected.idx;

        if(card.type === "prop" && card.sub === "lid") {
            let target = await selectTargetForPlayer(getOpponentPlayerObj(), true, false);
            if(!target) return;
            let { targetPlayer, targetIdx, watermelon } = target;
            watermelon.props.push({...card});
            cur.hand.splice(handIdx,1);
            globalMsg.innerText=`锅盖盖住了${targetPlayer.name}的西瓜${targetIdx+1}`;
            updateUI();
            return;
        }
        else if(card.type === "prop" && card.sub === "rod") {
            let target = await selectTargetForPlayer(cur, true, true);
            if(!target) return;
            let { targetPlayer, targetIdx, watermelon } = target;
            if(watermelon.props.some(p=>p.sub==='rod')) { alert("已有引雷针"); return; }
            watermelon.props.push({...card});
            cur.hand.splice(handIdx,1);
            globalMsg.innerText=`引雷针强化了己方西瓜${targetIdx+1}`;
            updateUI();
            return;
        }
        else if(card.sub === "knife") {
            let target = await selectTargetForPlayer(cur, false, false);
            if(!target) return;
            let { targetPlayer, targetIdx, watermelon } = target;
            let hasLid = watermelon.props.some(p=>p.sub==='lid');
            if(hasLid) { alert("被锅盖盖住无法切"); return; }
            if(watermelon.state === "sliced") { alert("已是切块"); return; }
            targetPlayer.saveHistory(targetIdx);
            watermelon.state = "sliced";
            cur.hand.splice(handIdx,1);
            game.discardPile.push({...card});
            globalMsg.innerText=`小刀切开了西瓜${targetIdx+1}`;
            updateUI();
            checkWin();
            return;
        }
        else if(card.sub === "lightning") {
            let target = await selectTargetForPlayer(cur, false, false);
            if(!target) return;
            let { targetPlayer, targetIdx, watermelon: targetWatermelon } = target;
            if (targetWatermelon.props.length === 0) {
                alert("该西瓜上没有锅盖或引雷针，无法发挥闪电效果！");
                return;
            }
            const toClear = new Set();
            toClear.add(`${targetPlayer.id}_${targetIdx}`);
            const allPlayers = [game.playerA, game.playerB];
            for (let player of allPlayers) {
                for (let idx = 0; idx < player.watermelons.length; idx++) {
                    const wm = player.watermelons[idx];
                    const hasRod = wm.props.some(p => p.sub === 'rod');
                    if (hasRod) {
                        toClear.add(`${player.id}_${idx}`);
                    }
                }
            }
            let clearedCount = 0;
            let msgParts = [];
            for (let key of toClear) {
                const [pId, idxStr] = key.split('_');
                const player = getPlayerById(pId);
                const idx = parseInt(idxStr);
                const wm = player.watermelons[idx];
                if (wm.props.length > 0) {
                    for (let p of wm.props) game.discardPile.push({...p});
                    wm.props = [];
                    clearedCount++;
                    msgParts.push(`${player.name}的西瓜${idx+1}`);
                }
            }
            cur.hand.splice(handIdx,1);
            game.discardPile.push({...card});
            if (clearedCount > 0) {
                globalMsg.innerText = `闪电⚡清除了 ${msgParts.join('、')} 上的所有道具！`;
            } else {
                globalMsg.innerText = `闪电⚡没有清除任何道具`;
            }
            updateUI();
            return;
        }
        else if(card.sub === "cloth") {
            let target = await selectTargetForPlayer(getOpponentPlayerObj(), false, false);
            if(!target) return;
            let { targetPlayer, targetIdx, watermelon } = target;
            if(!watermelon.history) { alert("没有可恢复的历史状态"); return; }
            let success = targetPlayer.restoreFromHistory(targetIdx, game);
            if(success) {
                cur.hand.splice(handIdx,1);
                game.discardPile.push({...card});
                globalMsg.innerText=`时光包袱布让${targetPlayer.name}的西瓜恢复了之前形态！`;
                updateUI();
                checkWin();
            } else alert("恢复失败");
            return;
        }
        else alert("未知卡牌");
    }

    function discardSelected() {
        if(game.phase !== "playing") return;
        let selected = getSelectedHandCard();
        if(!selected) { globalMsg.innerText="选中要弃的牌"; return; }
        let cur = getCurrentPlayerObj();
        game.discardPile.push({...selected.card});
        cur.hand.splice(selected.idx,1);
        updateUI();
        globalMsg.innerText="弃置一张牌";
    }

    function checkWin() {
        let aSliced = game.playerA.watermelons.every(w=>w.state==='sliced');
        let bSliced = game.playerB.watermelons.every(w=>w.state==='sliced');
        if(aSliced) { game.gameOver=true; game.winner=game.playerA; showVictory(game.playerA.name);}
        else if(bSliced) { game.gameOver=true; game.winner=game.playerB; showVictory(game.playerB.name);}
        if(game.gameOver) { handContainer.classList.add("hidden"); drawPhaseContainer.classList.add("hidden"); }
    }

    function showVictory(winnerName) {
        let overlay = document.createElement('div');
        overlay.className = 'victory-overlay';
        overlay.innerHTML = `<div class="victory-card"><div class="firework">🎉🍉✨</div><div>🏆 ${winnerName} 获胜！🏆</div><div>两块西瓜都被切啦！</div><button id="restartBtn" style="margin-top:20px;">再玩一次</button></div>`;
        document.body.appendChild(overlay);
        document.getElementById('restartBtn').onclick = ()=> location.reload();
    }

    async function finishTurn() {
        if(game.gameOver || game.phase !== "playing") return;
        let cur = getCurrentPlayerObj();
        let slicedCount = cur.watermelons.filter(w=>w.state==='sliced').length;
        let maxKeep = slicedCount===0 ? 1 : (slicedCount===1 ? 2 : 0);
        if(slicedCount===2) { checkWin(); if(game.gameOver) return; }
        if(cur.hand.length > maxKeep) {
            globalMsg.innerText=`需保留最多${maxKeep}张手牌，请弃牌至${maxKeep}张`;
            return;
        }
        game.currentPlayer = game.currentPlayer === "A" ? "B" : "A";
        game.phase = "waitingDraw";
        document.querySelectorAll('.hand-card').forEach(c=>c.classList.remove('selected'));
        updateUI();
        globalMsg.innerText=`回合结束，轮到 ${getCurrentPlayerObj().name}，点击"开始回合"摸牌。`;
    }

    async function initGame(roleAName, roleBName) {
        game.playerA = new Player("A", roleAName);
        game.playerB = new Player("B", roleBName);
        game.deck = buildDeck();
        game.discardPile = [];
        game.currentPlayer = "A";
        game.gameOver = false;
        game.phase = "waitingDraw";
        for(let w of game.playerA.watermelons) { w.state="full"; w.props=[]; w.history=null; }
        for(let w of game.playerB.watermelons) { w.state="full"; w.props=[]; w.history=null; }
        game.playerA.hand = [];
        game.playerB.hand = [];
        game.playerA.hasDrawnFirst = false;
        game.playerB.hasDrawnFirst = false;
        updateUI();
        globalMsg.innerText = `游戏开始！ ${game.playerA.name} 先行动，请点击"开始回合"摸牌。`;
    }

    function bindEvents() {
        useBtn.onclick = useCard;
        discardBtn.onclick = discardSelected;
        finishBtn.onclick = finishTurn;
        startTurnDrawBtn.onclick = startTurnDraw;
    }

    window.onload = () => {
        startScreen = document.getElementById("startScreen");
        startGameBtn = document.getElementById("startGameBtn");
        roleSelectPanel = document.getElementById("roleSelectPanel");
        mainPanel = document.getElementById("gameMain");
        roleASelect = document.getElementById("roleA");
        roleBSelect = document.getElementById("roleB");
        confirmBtn = document.getElementById("confirmStartBtn");
        opponentNameDiv = document.getElementById("opponentName");
        currentPlayerNameDiv = document.getElementById("currentPlayerName");
        opponentWatermelonsDiv = document.getElementById("opponentWatermelons");
        currentWatermelonsDiv = document.getElementById("currentWatermelons");
        handContainer = document.getElementById("handContainer");
        handCardsDiv = document.getElementById("handCards");
        useBtn = document.getElementById("useCardBtn");
        discardBtn = document.getElementById("discardSelectedBtn");
        finishBtn = document.getElementById("finishTurnBtn");
        turnMsgDiv = document.getElementById("turnMsg");
        globalMsg = document.getElementById("globalMsg");
        deckCountSpan = document.getElementById("deckCount");
        discardPileDiv = document.getElementById("discardPile");
        drawPhaseContainer = document.getElementById("drawPhaseContainer");
        startTurnDrawBtn = document.getElementById("startTurnDrawBtn");
        
        bindEvents();
        
        // 开始游戏按钮：隐藏开始界面，显示角色选择界面
        startGameBtn.onclick = () => {
            startScreen.classList.add("hidden-screen");
            roleSelectPanel.classList.remove("hidden");
        };
        
        // 确认开始游戏：隐藏角色选择，显示游戏主界面并初始化游戏
        confirmBtn.onclick = () => {
            let roleAName = roleASelect.value;
            let roleBName = roleBSelect.value;
            roleSelectPanel.classList.add("hidden");
            mainPanel.classList.remove("hidden");
            initGame(roleAName, roleBName);
        };
    };
</script>
</body>
</html>
